[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, OPTIONS"

# Short cache during dev — bump for production releases
[[headers]]
  for = "/main.js"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"
